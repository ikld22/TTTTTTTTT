<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadence</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
/* ── Projects layout ── */
.proj-layout{display:flex;height:100%;overflow:hidden;}
.proj-rail{width:210px;flex-shrink:0;border-right:1px solid var(--border);padding:20px 10px;display:flex;flex-direction:column;gap:3px;overflow-y:auto;background:var(--bg2)}
.proj-rail-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink4);padding:0 8px;margin-bottom:10px}
.proj-rail-btn{display:flex;align-items:center;gap:10px;padding:10px 10px 10px 14px;border-radius:var(--r);cursor:pointer;border:none;border-left:3px solid transparent;background:none;width:100%;text-align:left;transition:background .1s;color:var(--ink)}
.proj-rail-btn:hover{background:var(--bg3)}
.proj-rail-btn.sel{background:var(--surface)}
.proj-rail-icon{width:30px;height:30px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.proj-rail-name{font-size:13px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.proj-rail-pct{font-size:11px;color:var(--ink4);font-weight:600;flex-shrink:0}
.proj-rail-bar{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:4px}
.proj-rail-fill{height:100%;border-radius:2px;transition:width .4s}

/* ── Detail ── */
.proj-detail{flex:1;overflow-y:auto;display:flex;flex-direction:column}

/* ── Banner ── */
.proj-banner{padding:28px 32px 24px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:0;position:relative;overflow:hidden}
.proj-banner-accent{position:absolute;top:0;left:0;right:0;height:4px}
.proj-banner-top{display:flex;align-items:flex-start;gap:20px}
.proj-banner-icon{width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.proj-banner-text{flex:1}
.proj-banner-name{font-family:var(--serif);font-size:28px;letter-spacing:-.5px;color:var(--ink);line-height:1.1;margin-bottom:6px}
.proj-banner-desc{font-size:13px;color:var(--ink3);line-height:1.65;text-wrap:pretty;max-width:560px}
.proj-banner-right{display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 18px;border-radius:10px;border:1px solid var(--border);background:var(--surface);text-align:center;flex-shrink:0}
.proj-banner-days{font-family:var(--serif);font-size:44px;line-height:1;font-weight:600}
.proj-banner-days-label{font-size:11px;color:var(--ink4);font-weight:500}
.proj-banner-days-sub{font-size:10px;color:var(--ink4);font-style:italic;margin-top:1px}

/* ── Stats bar ── */
.proj-statsbar{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--surface)}
.proj-stat{flex:1;display:flex;flex-direction:column;align-items:center;padding:14px 8px;border-right:1px solid var(--border);gap:2px}
.proj-stat:last-child{border-right:none}
.proj-stat-n{font-family:var(--serif);font-size:26px;line-height:1;font-weight:600;color:var(--ink)}
.proj-stat-l{font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--ink4)}

/* ── Body ── */
.proj-body{flex:1;display:grid;grid-template-columns:1fr 200px;gap:0;overflow:hidden}
.proj-main{padding:20px 24px;overflow-y:auto;border-right:1px solid var(--border)}
.proj-aside{padding:16px;overflow-y:auto;background:var(--bg2);min-width:0}

/* ── Section label ── */
.proj-slabel{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink4);margin-bottom:12px}

/* ── Milestones ── */
.ms-list{display:flex;flex-direction:column;gap:0;margin-bottom:0}
.ms-item{display:flex;align-items:flex-start;gap:12px;padding:9px 0;position:relative}
.ms-item:not(:last-child)::before{content:'';position:absolute;left:7px;top:22px;bottom:-9px;width:2px;background:var(--border)}
.ms-dot{width:16px;height:16px;border-radius:50%;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:8px;color:white;z-index:1}
.ms-body{flex:1}
.ms-title{font-size:13px;font-weight:500;color:var(--ink2);line-height:1.35}
.ms-done .ms-title{text-decoration:line-through;opacity:.6}
.ms-date{font-size:11px;font-weight:500;margin-top:2px}

/* ── Progress ring ── */
.proj-ring-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:16px}
.proj-ring-label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink4)}
.proj-ring-pct{font-family:var(--serif);font-size:15px;font-weight:600}

/* ── Kanban ── */
.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;min-width:0}
.kanban-col{background:var(--bg2);border-radius:var(--r2);overflow:hidden;display:flex;flex-direction:column;min-height:200px;min-width:0}
.kanban-hd{display:flex;align-items:center;gap:7px;padding:11px 12px 10px;border-bottom:1px solid var(--border)}
.kanban-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.kanban-htitle{font-size:12px;font-weight:600;color:var(--ink2);flex:1}
.kanban-hcount{font-size:11px;color:var(--ink4);font-weight:600;background:var(--bg3);padding:1px 7px;border-radius:10px}
.kanban-body{flex:1;padding:8px;display:flex;flex-direction:column;gap:7px;overflow-y:auto}
.kanban-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 10px 10px 9px;cursor:pointer;transition:all .12s;box-shadow:var(--shadow);display:flex;gap:7px;align-items:flex-start}
.kanban-card:hover{transform:translateY(-1px);box-shadow:var(--shadow2)}
.kanban-card.is-done{opacity:.55}
.kanban-card-bar{width:3px;align-self:stretch;border-radius:2px;flex-shrink:0;min-height:14px}
.kanban-card-body{flex:1;min-width:0}
.kanban-card-title{font-size:12.5px;color:var(--ink);line-height:1.45;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.is-done .kanban-card-title{text-decoration:line-through}
.kanban-card-meta{display:flex;align-items:center;gap:5px;margin-top:5px;flex-wrap:wrap}
.kanban-empty{padding:24px 12px;text-align:center;font-size:12px;color:var(--ink4)}

/* ── toggle ── */
.view-toggle{display:flex;gap:3px;background:var(--bg2);padding:3px;border-radius:var(--r);border:1px solid var(--border)}
.view-toggle button{padding:4px 12px;border-radius:4px;border:none;background:none;font-size:12px;font-weight:500;color:var(--ink3);cursor:pointer;transition:all .12s;font-family:var(--sans)}
.view-toggle button.on{background:var(--surface);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08)}
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Data + helpers (plain JS, sets window globals) -->
  <script src="data.js"></script>

  <!-- Tweaks panel (React/Babel, sets window globals) -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <!-- Shared components -->
  <script type="text/babel" src="components.jsx"></script>

  <!-- Views -->
  <script type="text/babel" src="views.jsx"></script>

  <!-- Main app (mounts to #root) -->
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
